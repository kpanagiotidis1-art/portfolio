<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;700&family=Work+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="scss/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <nav class="nav">
        <div class="nav__logo">
            <a href="index.html">KP</a>
        </div>

        <button class="nav__toggle" id="navToggle">
            <span class="nav__toggle-bar"></span>
            <span class="nav__toggle-bar"></span>
            <span class="nav__toggle-bar"></span>
        </button>

        <div class="nav__overlay" id="navOverlay">
            <div class="nav__card">
                <ul class="nav__links">
                    <li class="nav__item"><a href="index.html" class="nav__link">Home</a></li>
                    <li class="nav__item"><a href="about.html" class="nav__link">About</a></li>
                    <li class="nav__item"><a href="skills.html" class="nav__link">Skills</a></li>
                    <li class="nav__item"><a href="projects.html" class="nav__link">Projects</a></li>
                    <li class="nav__item"><a href="contact.html" class="nav__link">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="main">
        <section class="contact">
            <div class="contact__left">
                <div class="contact__left-top">
                    <p class="contact__tag">Get in touch</p>
                    <div class="contact__divider"></div>
                    <h1 class="contact__name">Kosta<br>Panagiotidis</h1>
                </div>
                <p class="contact__tagline">Open to opportunities,<br>collaborations & conversations.</p>
            </div>

            <div class="contact__right">
                <form class="contact__form" action="https://formspree.io/f/xgobrayg" method="POST">
                    <input type="text" name="name" class="contact__input" placeholder="Name">
                    <input type="email" name="email" class="contact__input" placeholder="Email">
                    <textarea name="message" class="contact__textarea" placeholder="Message"></textarea>
                    <button type="submit" class="contact__btn">Send message</button>
                </form>

                <div class="contact__socials">
                    <a href="https://github.com/kpanagiotidis1-art" class="contact__social-link" target="_blank">
                        <i class="fa-brands fa-github"></i> GitHub
                    </a>
                    <a href="https://www.linkedin.com/in/kosta-panagiotidis-23280220b/" class="contact__social-link" target="_blank">
                        <i class="fa-brands fa-linkedin"></i> LinkedIn
                    </a>
                </div>
            </div>
        </section>
    </main>
    
    <footer class="footer">
        <div class="footer__icons">
            <a href="https://github.com/kpanagiotidis1-art" class="footer__link" target="_blank">
                <i class="fa-brands fa-github"></i>
            </a>
            <a href="https://www.linkedin.com/in/kosta-panagiotidis-23280220b/" class="footer__link" target="_blank">
